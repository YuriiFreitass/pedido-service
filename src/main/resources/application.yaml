server:
  port: 8081

spring:
  application:
    name: pedido-service

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:mysql://localhost:3307/pedido_db?createDatabaseIfNotExist=true
    username: ${ENV_MYSQL_USER}
    password: ${ENV_MYSQL_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true